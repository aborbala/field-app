<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Field Data Collector</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- LeafletJS for maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <style>
        /* Ensure the map container has a defined height */
        #map { 
            height: 45vh; 
            width: 100%;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
        /* Small style adjustments for better mobile experience */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevent bouncing */
            font-family: 'Inter', sans-serif;
        }
        .main-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .scrollable-list {
            overflow-y: auto;
            flex-grow: 1;
        }
    </style>
</head>
<body class="bg-gray-100">

    <div class="main-container max-w-2xl mx-auto bg-white shadow-lg h-full">
        <!-- Header -->
        <header class="bg-indigo-600 text-white p-4 text-center shadow-md">
            <h1 class="text-2xl font-bold">Field Data Collector</h1>
        </header>

        <!-- Map Container -->
        <div class="p-4">
            <div id="map"></div>
            <p id="status" class="text-center text-sm text-gray-500 mt-2">Initializing and finding your location...</p>
        </div>
        
        <!-- Controls -->
        <div class="px-4 pb-4 border-b border-gray-200">
            <div class="flex flex-col sm:flex-row gap-3">
                <input type="text" id="pointName" placeholder="Point Name (e.g., Tree-01)" class="flex-grow p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <button id="registerBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-md shadow-md transition-transform transform hover:scale-105 disabled:bg-gray-400 disabled:cursor-not-allowed disabled:scale-100" disabled>
                    Register Current Location
                </button>
            </div>
        </div>

        <!-- Collected Points List -->
        <div class="flex-grow flex flex-col min-h-0">
             <div class="flex justify-between items-center p-4">
                <h2 class="text-xl font-semibold text-gray-700">Collected Points</h2>
                <button id="exportBtn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-md shadow-md transition-transform transform hover:scale-105 disabled:bg-gray-400 disabled:cursor-not-allowed" disabled>
                    Export as GPX
                </button>
            </div>
            <div id="pointsList" class="scrollable-list px-4 pb-4">
                <p class="text-gray-500 text-center italic">No points collected yet.</p>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const mapElement = document.getElementById('map');
            const statusElement = document.getElementById('status');
            const registerBtn = document.getElementById('registerBtn');
            const exportBtn = document.getElementById('exportBtn');
            const pointNameInput = document.getElementById('pointName');
            const pointsListElement = document.getElementById('pointsList');

            let map;
            let currentLocationMarker;
            let collectedPoints = [];
            let currentCoords = null;
            let pointCounter = 1;

            // 1. Initialize Map
            function initMap(lat, lon) {
                map = L.map(mapElement).setView([lat, lon], 18); // High zoom level
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '© <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
                }).addTo(map);

                // Create a reusable marker for the current location
                const blueIcon = L.icon({
                    iconUrl: 'data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22%232563eb%22%3E%3Cpath%20d%3D%22M12%202C8.13%202%205%205.13%205%209c0%205.25%207%2013%207%2013s7-7.75%207-13c0-3.87-3.13-7-7-7zm0%209.5c-1.38%200-2.5-1.12-2.5-2.5s1.12-2.5%202.5-2.5%202.5%201.12%202.5%202.5-1.12%202.5-2.5%202.5z%22%2F%3E%3C%2Fsvg%3E',
                    iconSize: [32, 32],
                    iconAnchor: [16, 32],
                    popupAnchor: [0, -32]
                });
                currentLocationMarker = L.marker([lat, lon], { icon: blueIcon }).addTo(map)
                    .bindPopup('Your Location').openPopup();
                
                statusElement.textContent = 'Location found. Tap the map or use the button to add points.';
                registerBtn.disabled = false;

                // Add map click event listener
                map.on('click', onMapClick);
            }

            // NEW: Handle map clicks to add points
            function onMapClick(e) {
                const pointName = pointNameInput.value.trim() || `Clicked-${pointCounter}`;
                
                const pointData = {
                    name: pointName,
                    lat: e.latlng.lat,
                    lon: e.latlng.lng,
                    time: new Date().toISOString()
                };

                collectedPoints.push(pointData);
                pointCounter++;
                pointNameInput.value = ''; // Clear input for next point
                updatePointsList();
                
                // Add a marker for the collected point
                L.marker([pointData.lat, pointData.lon]).addTo(map).bindPopup(pointData.name);
                statusElement.textContent = `Added '${pointName}' at the clicked location.`;
            }
            
            // 2. Handle Location Finding
            function onLocationFound(e) {
                currentCoords = e.coords;
                const { latitude, longitude, accuracy } = e.coords;
                
                const currentStatus = statusElement.textContent;
                // Only update accuracy if not showing a temporary message like "Added point..."
                if (currentStatus.startsWith('Initializing') || currentStatus.startsWith('Accuracy') || currentStatus.startsWith('Location found')) {
                    statusElement.textContent = `Accuracy: ${accuracy.toFixed(1)} meters.`;
                }

                if (!map) {
                    initMap(latitude, longitude);
                } else {
                    const latlng = [latitude, longitude];
                    currentLocationMarker.setLatLng(latlng);
                }
            }

            function onLocationError(err) {
                statusElement.textContent = `Error getting location: ${err.message}`;
                // Using a custom styled message box instead of alert
                const errorDiv = document.createElement('div');
                errorDiv.className = 'fixed top-5 left-1/2 -translate-x-1/2 bg-red-500 text-white p-4 rounded-lg shadow-lg z-50';
                errorDiv.textContent = `Could not get your location. Please ensure location services are enabled.`;
                document.body.appendChild(errorDiv);
                setTimeout(() => errorDiv.remove(), 4000);
            }

            // Start watching position
            if ('geolocation' in navigator) {
                navigator.geolocation.watchPosition(onLocationFound, onLocationError, {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 10000
                });
            } else {
                statusElement.textContent = 'Geolocation is not supported by your browser.';
            }

            // 3. Register Point Logic
            registerBtn.addEventListener('click', () => {
                if (!currentCoords) {
                    const warningDiv = document.createElement('div');
                    warningDiv.className = 'fixed top-5 left-1/2 -translate-x-1/2 bg-yellow-500 text-black p-4 rounded-lg shadow-lg z-50';
                    warningDiv.textContent = 'Current location not available yet. Please wait.';
                    document.body.appendChild(warningDiv);
                    setTimeout(() => warningDiv.remove(), 3000);
                    return;
                }

                const pointName = pointNameInput.value.trim() || `Point-${pointCounter}`;
                
                const pointData = {
                    name: pointName,
                    lat: currentCoords.latitude,
                    lon: currentCoords.longitude,
                    time: new Date().toISOString()
                };

                collectedPoints.push(pointData);
                pointCounter++;
                pointNameInput.value = ''; // Clear input
                updatePointsList();
                
                // Add a marker for the collected point
                L.marker([pointData.lat, pointData.lon]).addTo(map).bindPopup(pointData.name);
                statusElement.textContent = `Registered '${pointName}' at your current location.`;
            });
            
            // 4. Update UI
            function updatePointsList() {
                if (collectedPoints.length === 0) {
                    pointsListElement.innerHTML = '<p class="text-gray-500 text-center italic">No points collected yet.</p>';
                    exportBtn.disabled = true;
                } else {
                    exportBtn.disabled = false;
                    pointsListElement.innerHTML = ''; // Clear list
                    const reversedPoints = [...collectedPoints].reverse(); // Show newest first
                    reversedPoints.forEach((point, index) => {
                        const listItem = document.createElement('div');
                        listItem.className = 'flex justify-between items-center p-3 border-b border-gray-200';
                        listItem.innerHTML = `
                            <div>
                                <p class="font-semibold text-gray-800">${point.name}</p>
                                <p class="text-sm text-gray-500">${point.lat.toFixed(6)}, ${point.lon.toFixed(6)}</p>
                            </div>
                            <button class="text-red-500 hover:text-red-700 font-semibold" data-index="${collectedPoints.length - 1 - index}">Delete</button>
                        `;
                        pointsListElement.appendChild(listItem);
                    });
                }
            }
            
            // 5. Delete point
            pointsListElement.addEventListener('click', (e) => {
                if(e.target.tagName === 'BUTTON' && e.target.hasAttribute('data-index')) {
                    const index = parseInt(e.target.getAttribute('data-index'));
                    collectedPoints.splice(index, 1);
                    updatePointsList();
                }
            });

            // 6. Export Logic
            exportBtn.addEventListener('click', () => {
                if (collectedPoints.length === 0) return;

                let gpxContent = `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="SimpleFieldCollector" xmlns="http://www.topografix.com/GPX/1/1" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xsi:schemaLocation="http://www.topografix.com/GPX/1/1 http://www.topografix.com/GPX/1/1/gpx.xsd">
<metadata>
  <name>Collected Field Points</name>
  <time>${new Date().toISOString()}</time>
</metadata>
`;
                collectedPoints.forEach(point => {
                    gpxContent += `
<wpt lat="${point.lat}" lon="${point.lon}">
  <time>${point.time}</time>
  <name>${escapeXml(point.name)}</name>
  <sym>flag</sym>
</wpt>`;
                });

                gpxContent += `\n</gpx>`;
                
                downloadFile('collected_points.gpx', gpxContent, 'application/gpx+xml');
            });
            
            // Helper functions
            function escapeXml(unsafe) {
                return unsafe.replace(/[<>&'"]/g, function (c) {
                    switch (c) {
                        case '<': return '&lt;';
                        case '>': return '&gt;';
                        case '&': return '&amp;';
                        case '\'': return '&apos;';
                        case '"': return '&quot;';
                    }
                });
            }
            
            function downloadFile(filename, content, mimeType) {
                const blob = new Blob([content], { type: mimeType });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }
        });
    </script>
</body>
</html>
